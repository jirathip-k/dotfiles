"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:teal)\
$git_branch\
$git_status\
[](fg:teal bg:sapphire)\
$python\
$nodejs\
$rust\
$golang\
[](fg:sapphire bg:mauve)\
$cmd_duration\
[ ](fg:mauve)\
$line_break\
$character"""

palette = 'catppuccin_frappe'

[character]
success_symbol = '[❯](green)'
error_symbol = '[❯](red)'
vimcmd_symbol = '[❮](lavender)'

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "󰀵 "

[directory]
style = "bg:surface0 fg:text"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Projects" = " "
"~" = " "

[git_branch]
symbol = ""
style = "bg:teal fg:crust"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:teal fg:crust"
format = '[$all_status$ahead_behind ]($style)'

[python]
symbol = " "
style = "bg:sapphire fg:crust"
format = '[ $symbol$version( \($virtualenv\)) ]($style)'

[nodejs]
symbol = ""
style = "bg:sapphire fg:crust"
format = '[ $symbol $version ]($style)'

[rust]
symbol = ""
style = "bg:sapphire fg:crust"
format = '[ $symbol $version ]($style)'

[golang]
symbol = ""
style = "bg:sapphire fg:crust"
format = '[ $symbol $version ]($style)'

[cmd_duration]
min_time = 500
style = "bg:mauve fg:crust"
format = '[ 󰔟 $duration ]($style)'

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"
