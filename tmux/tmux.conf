# ~/.config/tmux/tmux.conf

# Use zsh as the default shell (macOS Homebrew path, then system fallback).
if-shell '[ -x /opt/homebrew/bin/zsh ]' 'set -g default-shell /opt/homebrew/bin/zsh'
if-shell '[ ! -x /opt/homebrew/bin/zsh ] && [ -x /bin/zsh ]' 'set -g default-shell /bin/zsh'

# True colour + modern terminal.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10          # snappier vi-mode / nvim
set -g history-limit 50000
setw -g mode-keys vi

# Splits
bind v split-window -h -c "#{pane_current_path}"
bind u split-window -v -c "#{pane_current_path}"

# Windows
bind c new-window -c "#{pane_current_path}"
bind r command-prompt 'rename-window %%'
bind n next-window
bind p previous-window

# Pane navigation (vim keys)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind t set status
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

set -g status-position bottom

# Plugins (tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'frappe'

run '~/.tmux/plugins/tpm/tpm'
