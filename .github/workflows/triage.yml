# Generated from agent-ops/stubs/managed-repo-triage.yml for jirathip-k.
#
# Requires:
#   - CLAUDE_CODE_OAUTH_TOKEN available to this repo (org secret, or repo secret)
#   - The agent-ops repo must allow workflow reuse:
#     agent-ops → Settings → Actions → General → Access →
#     "Accessible from repositories owned by <you>"

name: Hourly Agent Triage

on:
  schedule:
    # Start conservative: every 4 hours. Switch to '0 * * * *' (hourly)
    # once you trust the pipeline.
    - cron: '0 */4 * * *'
  workflow_dispatch: {}   # manual "run now" button for testing

jobs:
  triage:
    # The caller must grant everything the pipeline requests — a called
    # workflow cannot exceed the caller's token, and repo defaults are
    # read-only (omitting this causes an opaque startup_failure).
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write  # claude-code-action exchanges an OIDC token
    uses: jirathip-k/agent-ops/.github/workflows/triage-pipeline.yml@main
    with:
      target_repo: ${{ github.repository }}
      max_issues: 3
      auto_merge: false   # report-only; flip to true after a trusted week
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
