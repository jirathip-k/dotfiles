# Generated from agent-ops/stubs/managed-repo-promote.yml for jirathip-k.
#
# Opens/refreshes the staging → main promotion PR daily, so "which repos
# still need promoting" is always the set of open promotion PRs (visible in
# gh-dash's Promotions section). This lane never merges — promotion into
# main stays a human click.
#
# Needs no Claude session and no CLAUDE_CODE_OAUTH_TOKEN — it's a cheap
# git/gh call. Only workflow-reuse access on the agent-ops repo is required
# (same as the triage/groom stubs).

name: Daily Promotion PR

on:
  schedule:
    # After the daily groom (01:00); promotion PRs update automatically on
    # every staging push, so daily is only about opening missing ones.
    - cron: '30 1 * * *'
  workflow_dispatch: {} # manual "run now" button for testing

jobs:
  promote:
    # The caller must grant everything the pipeline requests — a called
    # workflow cannot exceed the caller's token.
    permissions:
      contents: read
      issues: read
      pull-requests: write
    uses: jirathip-k/agent-ops/.github/workflows/promote-pipeline.yml@main
    with:
      target_repo: ${{ github.repository }}
